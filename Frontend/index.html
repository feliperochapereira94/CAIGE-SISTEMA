<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIGE - Univale</title>
    <script>
        const jwtToken = localStorage.getItem('jwtToken');
        const sessionUserEmail = sessionStorage.getItem('userEmail');

        if (jwtToken && sessionUserEmail) {
            localStorage.setItem('userEmail', sessionUserEmail);
            window.location.href = './paginas/painel/painel.html';
        } else {
            localStorage.removeItem('userEmail');
            localStorage.removeItem('jwtToken');
            window.location.href = './paginas/autenticacao/entrar.html';
        }
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
